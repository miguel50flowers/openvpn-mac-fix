changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - github-actions[bot]
  categories:
    - title: "New Features"
      labels:
        - enhancement
        - feature
    - title: "Bug Fixes"
      labels:
        - bug
        - fix
    - title: "Maintenance"
      labels:
        - chore
        - maintenance
        - dependencies
    - title: "Other Changes"
      labels:
        - "*"

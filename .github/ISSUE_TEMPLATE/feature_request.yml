name: Feature Request
description: Suggest a new feature or improvement for VPN Fix
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! We appreciate your ideas.

  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: A clear description of the feature or improvement you'd like to see.
      placeholder: "I'd like VPN Fix to..."
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why would this feature be useful? What problem does it solve?
      placeholder: "This would help when..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any workarounds or alternative solutions?
      placeholder: "I've tried..."
    validations:
      required: false
